<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Hujan Merauke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-radio:checked + span { background-color: #1d4ed8; color: white; border-color: #1d4ed8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl border-t-[10px] border-blue-600 overflow-hidden">
        <div class="p-6">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-blue-900 leading-none">MONITORING HUJAN</h2>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.3em] mt-2">MERAUKE SUGAR PROJECT</p>
            </div>

            <div class="space-y-4">
                <div class="relative">
                    <label class="text-[10px] font-bold text-blue-500 uppercase ml-2">Petugas</label>
                    <input type="text" id="petugas" oninput="saveName()" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-blue-400 transition-all" placeholder="Nama Anda...">
                </div>

                <div class="relative">
                    <label class="text-[10px] font-bold text-blue-500 uppercase ml-2">Paddock / Blok</label>
                    <input type="text" id="paddock" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-blue-400 transition-all" placeholder="Nomor Paddock...">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startHujan()" id="btnStart" class="bg-emerald-500 text-white p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase text-xs">Mulai</button>
                    <button onclick="stopHujan()" id="btnStop" class="bg-rose-500 text-white p-4 rounded-2xl font-black shadow-lg opacity-20 active:scale-95 transition-all uppercase text-xs" disabled>Selesai</button>
                </div>

                <div class="flex justify-between bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-inner">
                    <div class="text-center w-full">
                        <p class="text-[8px] text-blue-400 font-bold uppercase">Waktu</p>
                        <p class="text-lg font-mono font-black text-blue-800"><span id="displayStart">--:--</span> <span class="text-blue-300">→</span> <span id="displayStop">--:--</span></p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Ringan" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Ringan</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Sedang" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Sedang</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Lebat" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Lebat</span>
                    </label>
                </div>

                <button onclick="kirimData()" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">Simpan Laporan</button>

                <div id="copySection" class="hidden animate-pulse">
                    <button onclick="copySingle()" class="w-full bg-emerald-50 text-emerald-600 border-2 border-emerald-200 py-3 rounded-xl font-bold text-xs uppercase">📋 Salin Laporan Tadi</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 p-6">
            <h3 class="text-center text-white text-[10px] font-black tracking-[0.4em] mb-4 opacity-50 uppercase italic underline decoration-blue-500">Admin Control Panel</h3>
            <div class="space-y-3">
                <p id="statHariIni" class="text-emerald-400 font-mono text-[9px] text-center mb-2 uppercase">Menghubungkan...</p>
                
                <button onclick="copyAllToday()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    📋 SALIN SEMUA DATA HARI INI
                </button>
                
                <button onclick="downloadExcelRange()" class="w-full bg-slate-700 text-slate-300 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-all flex items-center justify-center gap-2 border border-slate-600">
                    📂 UNDUH EXCEL (FILTER)
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALY1vj0Qp93fY0jYd3D7MFseJn24cyV9E",
            authDomain: "monitoring-hujan-27a0e.firebaseapp.com",
            projectId: "monitoring-hujan-27a0e",
            storageBucket: "monitoring-hujan-27a0e.firebasestorage.app",
            messagingSenderId: "864443661330",
            appId: "1:864443661330:web:41d987b7a412bb9fb12ccb",
            measurementId: "G-PDZN4T05Y1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let lastReport = ""; 
        let jamMulai, jamSelesai;

        window.onload = () => {
            const savedName = localStorage.getItem('namaPetugas');
            if(savedName) document.getElementById('petugas').value = savedName;
            monitorRealtime();
        };

        function saveName() {
            localStorage.setItem('namaPetugas', document.getElementById('petugas').value);
        }

        function startHujan() {
            jamMulai = new Date();
            document.getElementById('displayStart').innerText = jamMulai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStart').classList.add('opacity-20');
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStop').classList.remove('opacity-20');
        }

        function stopHujan() {
            jamSelesai = new Date();
            document.getElementById('displayStop').innerText = jamSelesai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStop').classList.add('opacity-20');
        }

        // FUNGSI SALIN (Sangat Stabil di HTTPS)
        async function copyAction(text) {
            try {
                await navigator.clipboard.writeText(text);
                alert("✅ Laporan sudah tersalin!");
            } catch (err) {
                // Fallback jika clipboard gagal
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("✅ Laporan tersalin (via fallback)!");
            }
        }

        async function kirimData() {
            const petugas = document.getElementById('petugas').value;
            const paddock = document.getElementById('paddock').value;
            const intensitas = document.querySelector('input[name="intensitas"]:checked')?.value;

            if (!petugas || !paddock || !jamMulai || !jamSelesai || !intensitas) {
                alert("Lengkapi semua kolom!"); return;
            }

            const durasi = Math.round((jamSelesai - jamMulai) / 60000);
            const tgl = new Date().toLocaleDateString('id-ID');

            try {
                await db.collection("data_hujan").add({
                    petugas, paddock, keterangan: intensitas, durasi_menit: durasi,
                    jam_mulai: jamMulai.toLocaleTimeString('id-ID'),
                    jam_selesai: jamSelesai.toLocaleTimeString('id-ID'),
                    tanggal: tgl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                lastReport = `*LAPORAN HUJAN*\n👤: ${petugas}\n📍: ${paddock}\n🌦️: ${intensitas}\n⏱️: ${durasi} Menit\n📅: ${tgl}`;
                document.getElementById('copySection').classList.remove('hidden');
                alert("✅ Data Berhasil Masuk!");
            } catch (e) { alert("Gagal: " + e.message); }
        }

        function copySingle() { copyAction(lastReport); setTimeout(() => location.reload(), 1000); }

        async function copyAllToday() {
            const tgl = new Date().toLocaleDateString('id-ID');
            const snapshot = await db.collection("data_hujan").where("tanggal", "==", tgl).orderBy("timestamp", "asc").get();

            if (snapshot.empty) return alert("Belum ada data hari ini.");

            let teksFull = `*REKAP MONITORING HUJAN HARI INI*\nTanggal: ${tgl}\n----------------------------\n`;
            let i = 1;
            snapshot.forEach(doc => {
                const d = doc.data();
                teksFull += `${i}. *${d.paddock}* | ${d.keterangan} | ${d.durasi_menit}m (${d.jam_mulai}-${d.jam_selesai}) - _${d.petugas}_\n`;
                i++;
            });
            teksFull += `\n----------------------------\n_Total: ${snapshot.size} Kejadian_`;

            copyAction(teksFull);
        }

        function monitorRealtime() {
            const tgl = new Date().toLocaleDateString('id-ID');
            db.collection("data_hujan").where("tanggal", "==", tgl)
              .onSnapshot(snap => {
                  document.getElementById('statHariIni').innerText = `SERVER: ${snap.size} DATA MASUK HARI INI`;
              });
        }

        async function downloadExcelRange() {
            const mulai = prompt("Unduh dari tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            const selesai = prompt("Sampai tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            if(!mulai || !selesai) return;

            const snapshot = await db.collection("data_hujan").where("tanggal", ">=", mulai).where("tanggal", "<=", selesai).get();
            let data = [];
            snapshot.forEach(doc => { let d = doc.data(); delete d.timestamp; data.push(d); });
            if(data.length === 0) return alert("Data kosong.");
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Rekap_Hujan_${mulai.replace(/\//g,'-')}.xlsx`);
        }
    </script>
</body>
</html>
