<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spraying Loss Tracker v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-radio:checked + span { background-color: #1d4ed8; color: white; border-color: #1d4ed8; }
        .tab-active { background-color: #1d4ed8 !important; color: white !important; font-weight: 900; }
        .rekap-active { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-3 font-sans pb-10">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl border-t-[12px] border-blue-700 overflow-hidden">
        
        <div class="p-6 pb-2 text-center">
            <h2 class="text-xl font-black text-blue-900 uppercase tracking-tighter">Spraying Loss Tracker</h2>
            <p class="text-[8px] text-slate-400 font-bold tracking-[0.4em] mt-1 uppercase italic">Analisis Low Productivity - Merauke</p>
            
            <div class="grid grid-cols-2 gap-2 mt-6">
                <input type="text" id="petugas" oninput="saveName()" class="bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl p-3 font-bold text-xs outline-none transition-all" placeholder="Petugas">
                <input type="text" id="paddock" class="bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl p-3 font-bold text-xs outline-none transition-all" placeholder="Paddock">
            </div>
        </div>

        <div class="px-6">
            <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200 mb-4">
                <button onclick="switchMode('hujan')" id="mHujan" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase tab-active transition-all">🌦️ Hujan</button>
                <button onclick="switchMode('angin')" id="mAngin" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all">💨 Angin</button>
                <button onclick="switchMode('tunggu')" id="mTunggu" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all">⏳ Tunggu</button>
            </div>

            <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 text-center mb-6 shadow-inner">
                <p id="timerDisplay" class="text-5xl font-black text-blue-900 font-mono">00:00</p>
                <p id="timerLabel" class="text-[9px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic">Lama Waktu Hujan Saat Spray</p>
                
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startTimer()" id="btnStart" class="bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all">▶ START</button>
                    <button onclick="stopTimer()" id="btnStop" class="bg-rose-500 text-white py-4 rounded-2xl font-black text-xs shadow-lg opacity-20 transition-all" disabled>■ STOP</button>
                </div>
            </div>

            <div id="inputHujan" class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Ringan" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Ringan</span></label>
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Sedang" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Sedang</span></label>
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Lebat" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Lebat</span></label>
                </div>
            </div>

            <div id="inputAngin" class="hidden bg-amber-50 p-4 rounded-2xl border border-amber-100 flex items-center justify-between">
                <span class="text-[9px] font-black text-amber-600 uppercase">Kec. Angin (Wind Meter)</span>
                <div class="flex items-center gap-1">
                    <input type="number" id="windSpeed" step="0.1" class="w-16 bg-white border-b-2 border-amber-500 text-center font-black text-lg outline-none" placeholder="0.0">
                    <span class="text-[9px] font-bold">Km/jam</span>
                </div>
            </div>

            <div id="inputTunggu" class="hidden text-center italic text-slate-400 text-[10px] p-2">
                "Mencatat waktu standby karena prediksi akan hujan."
            </div>

            <button onclick="saveData()" class="w-full bg-blue-800 text-white py-4 rounded-2xl font-black text-xs mt-6 shadow-xl uppercase tracking-widest active:scale-95 transition-all">Simpan Laporan</button>
        </div>

        <div class="bg-slate-50 border-t border-slate-200 mt-8 p-4 overflow-x-auto">
            <div class="flex text-[9px] font-black uppercase text-slate-400 border-b mb-3">
                <button onclick="switchRekap('hari')" id="rkHari" class="flex-1 py-2 rekap-active">Hari Ini</button>
                <button onclick="switchRekap('minggu')" id="rkMinggu" class="flex-1 py-2">7 Hari</button>
            </div>
            <table class="w-full text-[9px] text-left">
                <thead class="text-slate-400 uppercase">
                    <tr><th class="p-2">Kendala</th><th class="p-2">Paddock</th><th class="p-2 text-center">Durasi</th><th class="p-2 text-center">Aksi</th></tr>
                </thead>
                <tbody id="tableBody" class="font-medium"></tbody>
            </table>
        </div>

        <div class="bg-slate-900 p-6">
            <button onclick="downloadExcel()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">📂 Download Excel (km/jam)</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALY1vj0Qp93fY0jYd3D7MFseJn24cyV9E",
            authDomain: "monitoring-hujan-27a0e.firebaseapp.com",
            projectId: "monitoring-hujan-27a0e",
            storageBucket: "monitoring-hujan-27a0e.firebasestorage.app",
            messagingSenderId: "864443661330",
            appId: "1:864443661330:web:41d987b7a412bb9fb12ccb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentMode = 'hujan', startTime, timerInterval, rekapTab = 'hari';

        window.onload = () => {
            if(localStorage.getItem('namaPetugas')) document.getElementById('petugas').value = localStorage.getItem('namaPetugas');
            renderTable();
        };

        function saveName() { localStorage.setItem('namaPetugas', document.getElementById('petugas').value); }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('inputHujan').classList.toggle('hidden', mode !== 'hujan');
            document.getElementById('inputAngin').classList.toggle('hidden', mode !== 'angin');
            document.getElementById('inputTunggu').classList.toggle('hidden', mode !== 'tunggu');
            ['mHujan','mAngin','mTunggu'].forEach(m => document.getElementById(m).classList.remove('tab-active'));
            document.getElementById('m' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('tab-active');
            
            const labels = { hujan: 'Lama Waktu Hujan Saat Spray', angin: 'Lama Kecepatan Angin Tinggi', tunggu: 'Menunggu Cuaca (Standby)' };
            document.getElementById('timerLabel').innerText = labels[mode];
            resetTimerUI();
        }

        function resetTimerUI() {
            clearInterval(timerInterval);
            document.getElementById('timerDisplay').innerText = "00:00";
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStart').classList.remove('opacity-20');
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStop').classList.add('opacity-20');
        }

        function startTimer() {
            startTime = new Date();
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStart').classList.add('opacity-20');
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStop').classList.remove('opacity-20');
            timerInterval = setInterval(() => {
                const diff = new Date(new Date() - startTime);
                const m = String(diff.getUTCMinutes()).padStart(2, '0');
                const s = String(diff.getUTCSeconds()).padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('btnStop').disabled = true; document.getElementById('btnStop').classList.add('opacity-20'); }

        async function saveData() {
            const pet = document.getElementById('petugas').value;
            const pad = document.getElementById('paddock').value;
            const dur = document.getElementById('timerDisplay').innerText;
            if(!pet || !pad || dur === "00:00") return alert("Lengkapi data!");

            let detail = "";
            if(currentMode === 'hujan') detail = document.querySelector('input[name="ketHujan"]:checked')?.value || "-";
            if(currentMode === 'angin') detail = (document.getElementById('windSpeed').value || "0") + " km/jam";
            if(currentMode === 'tunggu') detail = "Standby (Akan Hujan)";

            await db.collection("spraying_loss_v9").add({
                petugas: pet, paddock: pad, durasi: dur, tipe: currentMode, keterangan: detail,
                tanggal: new Date().toLocaleDateString('id-ID'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Berhasil!"); location.reload();
        }

        function renderTable() {
            const tglSkrg = new Date().toLocaleDateString('id-ID');
            db.collection("spraying_loss_v9").onSnapshot(snap => {
                const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
                let arr = []; snap.forEach(doc => arr.push({id: doc.id, ...doc.data()}));
                if(rekapTab === 'hari') arr = arr.filter(d => d.tanggal === tglSkrg);
                arr.sort((a,b) => b.timestamp - a.timestamp);
                arr.forEach(d => {
                    const icon = d.tipe === 'hujan' ? '🌦️' : d.tipe === 'angin' ? '💨' : '⏳';
                    tbody.innerHTML += `<tr class="border-b border-slate-100"><td class="p-3 font-bold">${icon} ${d.keterangan}</td><td class="p-3 font-black">${d.paddock}</td><td class="p-3 text-center font-mono text-blue-700">${d.durasi}</td><td class="p-3 text-center"><button onclick="hapus('${d.id}')" class="text-rose-400">X</button></td></tr>`;
                });
            });
        }

        async function hapus(id) { if(confirm("Hapus?")) await db.collection("spraying_loss_v9").doc(id).delete(); }
        function switchRekap(t) { rekapTab = t; document.getElementById('rkHari').className = t==='hari' ? 'flex-1 py-2 rekap-active' : 'flex-1 py-2'; document.getElementById('rkMinggu').className = t==='minggu' ? 'flex-1 py-2 rekap-active' : 'flex-1 py-2'; renderTable(); }
        
        async function downloadExcel() {
            const snap = await db.collection("spraying_loss_v9").get();
            let arr = []; snap.forEach(doc => arr.push(doc.data()));
            const ws = XLSX.utils.json_to_sheet(arr);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Spray_Loss_Report");
            XLSX.writeFile(wb, "Analisis_Spray_Loss_KmJam.xlsx");
        }
    </script>
</body>
</html>
