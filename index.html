<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spray Tracker v10 - Merauke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-radio:checked + span { background-color: #1d4ed8; color: white; }
        .tab-active { background-color: #1d4ed8 !important; color: white !important; font-weight: 900; }
        .rekap-active { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-3 pb-10">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl border-t-[12px] border-blue-700 overflow-hidden">
        
        <div class="p-6 pb-2 text-center">
            <h2 class="text-xl font-black text-blue-900 uppercase">Spray Productivity Tracker</h2>
            <p class="text-[8px] text-slate-400 font-bold tracking-[0.3em] mt-1">SISTEM ANTI-TERPUTUS V10</p>
            
            <div class="grid grid-cols-2 gap-2 mt-6">
                <input type="text" id="petugas" oninput="savePersist()" class="bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl p-3 font-bold text-xs outline-none transition-all" placeholder="Petugas">
                <input type="text" id="paddock" oninput="savePersist()" class="bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl p-3 font-bold text-xs outline-none transition-all" placeholder="Paddock">
            </div>
        </div>

        <div class="px-6">
            <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200 mb-4">
                <button onclick="switchMode('hujan')" id="mHujan" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase tab-active transition-all">🌦️ Hujan</button>
                <button onclick="switchMode('angin')" id="mAngin" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all">💨 Angin</button>
                <button onclick="switchMode('tunggu')" id="mTunggu" class="flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all">⏳ Lainnya</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] text-center mb-6 shadow-xl">
                <p id="timerDisplay" class="text-5xl font-black text-emerald-400 font-mono tracking-tighter">00:00:00</p>
                <p id="timerLabel" class="text-[9px] font-bold text-slate-500 uppercase mt-2 italic">Siap Mencatat Kendala</p>
                <p id="startTimeLabel" class="text-[8px] text-slate-600 mt-1 font-mono uppercase">Mulai: --:--:--</p>
                
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startTimer()" id="btnStart" class="bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all">▶ START</button>
                    <button onclick="stopTimer()" id="btnStop" class="bg-rose-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg opacity-20 transition-all" disabled>■ STOP</button>
                </div>
            </div>

            <div id="inputHujan" class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Ringan" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Ringan</span></label>
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Sedang" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Sedang</span></label>
                    <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Lebat" class="hidden active-radio"><span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase transition-all">Lebat</span></label>
                </div>
            </div>

            <div id="inputAngin" class="hidden bg-amber-50 p-4 rounded-2xl border border-amber-100 flex items-center justify-between">
                <span class="text-[9px] font-black text-amber-600 uppercase">Kec. Angin Max</span>
                <div class="flex items-center gap-1">
                    <input type="number" id="windSpeed" step="0.1" class="w-16 bg-white border-b-2 border-amber-500 text-center font-black text-lg outline-none" placeholder="0.0">
                    <span class="text-[9px] font-bold uppercase">Km/jam</span>
                </div>
            </div>

            <div id="inputTunggu" class="hidden">
                <input type="text" id="customReason" class="w-full bg-slate-100 border-2 border-slate-200 rounded-xl p-3 font-bold text-xs outline-none" placeholder="Alasan Standby (Misal: Kerusakan Mesin)">
            </div>

            <button onclick="saveData()" class="w-full bg-blue-800 text-white py-4 rounded-2xl font-black text-xs mt-6 shadow-xl uppercase tracking-widest active:scale-95 transition-all">Simpan Laporan Akhir</button>
        </div>

        <div class="bg-slate-50 border-t border-slate-200 mt-8 p-4">
            <div class="flex text-[9px] font-black uppercase text-slate-400 border-b mb-3">
                <button onclick="switchRekap('hari')" id="rkHari" class="flex-1 py-2 rekap-active">Rekap Hari Ini</button>
                <button onclick="switchRekap('minggu')" id="rkMinggu" class="flex-1 py-2">7 Hari Terakhir</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[9px] text-left">
                    <thead class="text-slate-400 uppercase"><tr><th class="p-2">Jam</th><th class="p-2">Kendala</th><th class="p-2 text-center">Durasi</th><th class="p-2 text-center">Aksi</th></tr></thead>
                    <tbody id="tableBody" class="font-medium text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-slate-900 p-6">
            <button onclick="downloadExcel()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">📂 Download Excel Lengkap</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALY1vj0Qp93fY0jYd3D7MFseJn24cyV9E",
            authDomain: "monitoring-hujan-27a0e.firebaseapp.com",
            projectId: "monitoring-hujan-27a0e",
            storageBucket: "monitoring-hujan-27a0e.firebasestorage.app",
            messagingSenderId: "864443661330",
            appId: "1:864443661330:web:41d987b7a412bb9fb12ccb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentMode = 'hujan', timerInterval, rekapTab = 'hari';

        window.onload = () => {
            document.getElementById('petugas').value = localStorage.getItem('spray_petugas') || "";
            document.getElementById('paddock').value = localStorage.getItem('spray_paddock') || "";
            checkRunningTimer();
            renderTable();
        };

        function savePersist() {
            localStorage.setItem('spray_petugas', document.getElementById('petugas').value);
            localStorage.setItem('spray_paddock', document.getElementById('paddock').value);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('inputHujan').classList.toggle('hidden', mode !== 'hujan');
            document.getElementById('inputAngin').classList.toggle('hidden', mode !== 'angin');
            document.getElementById('inputTunggu').classList.toggle('hidden', mode !== 'tunggu');
            ['mHujan','mAngin','mTunggu'].forEach(m => document.getElementById(m).classList.remove('tab-active'));
            document.getElementById('m' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('tab-active');
            const lb = { hujan: 'Lama Waktu Hujan', angin: 'Lama Angin Kencang', tunggu: 'Lama Waktu Standby' };
            document.getElementById('timerLabel').innerText = lb[mode];
        }

        function startTimer() {
            const now = Date.now();
            localStorage.setItem('spray_timer_start', now);
            localStorage.setItem('spray_timer_mode', currentMode);
            updateTimerUI(true);
            runTimerDisplay(now);
        }

        function checkRunningTimer() {
            const savedStart = localStorage.getItem('spray_timer_start');
            if(savedStart) {
                const mode = localStorage.getItem('spray_timer_mode');
                switchMode(mode);
                updateTimerUI(true);
                runTimerDisplay(parseInt(savedStart));
            }
        }

        function runTimerDisplay(startTime) {
            document.getElementById('startTimeLabel').innerText = "Mulai: " + new Date(startTime).toLocaleTimeString('id-ID');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            localStorage.setItem('spray_timer_end', Date.now());
            updateTimerUI(false);
        }

        function updateTimerUI(running) {
            document.getElementById('btnStart').disabled = running;
            document.getElementById('btnStart').classList.toggle('opacity-20', running);
            document.getElementById('btnStop').disabled = !running;
            document.getElementById('btnStop').classList.toggle('opacity-20', !running);
        }

        async function saveData() {
            const pet = document.getElementById('petugas').value;
            const pad = document.getElementById('paddock').value;
            const start = localStorage.getItem('spray_timer_start');
            const end = localStorage.getItem('spray_timer_end');
            
            if(!pet || !pad || !start || !end) return alert("Lengkapi data & Stop Timer!");

            const durasiFinal = document.getElementById('timerDisplay').innerText;
            let detail = "";
            if(currentMode === 'hujan') detail = document.querySelector('input[name="ketHujan"]:checked')?.value || "Hujan";
            else if(currentMode === 'angin') detail = (document.getElementById('windSpeed').value || "0") + " Km/jam";
            else detail = document.getElementById('customReason').value || "Standby";

            await db.collection("spray_analytics").add({
                petugas: pet, paddock: pad, durasi: durasiFinal, tipe: currentMode, keterangan: detail,
                jam_mulai: new Date(parseInt(start)).toLocaleTimeString('id-ID'),
                jam_selesai: new Date(parseInt(end)).toLocaleTimeString('id-ID'),
                tanggal: new Date(parseInt(start)).toLocaleDateString('id-ID'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            localStorage.removeItem('spray_timer_start');
            localStorage.removeItem('spray_timer_end');
            alert("Data Berhasil Tersimpan!");
            location.reload();
        }

        function renderTable() {
            const tglSkrg = new Date().toLocaleDateString('id-ID');
            db.collection("spray_analytics").onSnapshot(snap => {
                const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
                let arr = []; snap.forEach(doc => arr.push({id: doc.id, ...doc.data()}));
                if(rekapTab === 'hari') arr = arr.filter(d => d.tanggal === tglSkrg);
                arr.sort((a,b) => b.timestamp - a.timestamp);
                arr.forEach(d => {
                    const icon = d.tipe === 'hujan' ? '🌦️' : d.tipe === 'angin' ? '💨' : '⏳';
                    tbody.innerHTML += `<tr class="border-b border-slate-100"><td class="p-2 text-[8px] opacity-60">${d.jam_mulai}</td><td class="p-2 font-bold">${icon} ${d.keterangan}</td><td class="p-2 text-center font-mono font-black text-blue-700">${d.durasi}</td><td class="p-2 text-center"><button onclick="hapus('${d.id}')" class="text-rose-400 font-black px-2">X</button></td></tr>`;
                });
            });
        }

        async function hapus(id) { if(confirm("Hapus?")) await db.collection("spray_analytics").doc(id).delete(); }
        function switchRekap(t) { rekapTab = t; ['rkHari','rkMinggu'].forEach(r => document.getElementById(r).classList.remove('rekap-active')); document.getElementById('rk' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('rekap-active'); renderTable(); }

        async function downloadExcel() {
            const snap = await db.collection("spray_analytics").get();
            let arr = []; snap.forEach(doc => {
                const d = doc.data();
                arr.push({ Tanggal: d.tanggal, Jam_Mulai: d.jam_mulai, Jam_Selesai: d.jam_selesai, Paddock: d.paddock, Petugas: d.petugas, Tipe_Kendala: d.tipe, Detail: d.keterangan, Durasi_Total: d.durasi });
            });
            const ws = XLSX.utils.json_to_sheet(arr);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan_Produktivitas");
            XLSX.writeFile(wb, "Spray_Loss_V10.xlsx");
        }
    </script>
</body>
</html>
