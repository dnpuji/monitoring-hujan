<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spray Tracker v12 - PWA</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1d4ed8', secondary: '#3b82f6' }
                }
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .active-radio:checked + span { background-color: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3); }
        .tab-active { background-color: #1e293b !important; color: white !important; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .locked { opacity: 0.5; pointer-events: none; filter: grayscale(50%); }
        
        /* Bottom Nav Transition */
        .nav-item { transition: all 0.3s ease; }
        .nav-item:active { transform: scale(0.9); }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-6 rounded-b-[2rem] shadow-lg sticky top-0 z-40 flex items-center gap-4">
        <img src="./logo.png" alt="Logo" class="w-14 h-14 object-contain filter drop-shadow-md rounded-full bg-white/20 p-1">
        <div>
            <h1 class="text-2xl font-black tracking-tight">SPRAY TRACKER</h1>
            <p class="text-[10px] font-bold text-blue-200 uppercase tracking-widest mt-1">Sistem Cerdas Real-Time</p>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto relative z-10 -mt-4">
        
        <!-- ================= TRACKER SECTION ================= -->
        <section id="tracker-section" class="space-y-4 transition-all duration-300">
            <!-- Form Card -->
            <div id="formContainer" class="glass rounded-3xl p-5 shadow-xl transition-all">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2">Pengaturan Tugas</h2>
                
                <div class="space-y-3">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-slate-400 absolute top-2 left-3">PENGKAJI / MANDOR</label>
                        <input list="list_pengawas" type="text" id="pengawas" oninput="savePersist()" class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 rounded-xl pt-6 pb-2 px-3 font-bold text-sm outline-none transition-all" placeholder="Pilih atau Ketik...">
                        <datalist id="list_pengawas"></datalist>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <label class="text-[10px] font-bold text-slate-400 absolute top-2 left-3">PADDOCK</label>
                            <input list="list_paddock" type="text" id="paddock" oninput="savePersist()" class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 rounded-xl pt-6 pb-2 px-3 font-bold text-sm outline-none" placeholder="Pilih...">
                            <datalist id="list_paddock"></datalist>
                        </div>
                        <div class="relative">
                            <label class="text-[10px] font-bold text-slate-400 absolute top-2 left-3">KEGIATAN</label>
                            <input list="list_kegiatan" type="text" id="kegiatan" oninput="savePersist()" class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 rounded-xl pt-6 pb-2 px-3 font-bold text-sm outline-none" placeholder="Pilih...">
                            <datalist id="list_kegiatan"></datalist>
                        </div>
                    </div>
                </div>

                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200 mt-5">
                    <button onclick="switchMode('hujan')" id="mHujan" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase tab-active transition-all">🌦️ Hujan</button>
                    <button onclick="switchMode('angin')" id="mAngin" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase transition-all text-slate-500">💨 Angin</button>
                    <button onclick="switchMode('tunggu')" id="mTunggu" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase transition-all text-slate-500">⏳ Lainnya</button>
                </div>

                <!-- Kendala Options -->
                <div class="mt-4">
                    <div id="inputHujan" class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Ringan" class="hidden active-radio"><span class="block text-center p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-500 uppercase transition-all">Ringan</span></label>
                        <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Sedang" class="hidden active-radio" checked><span class="block text-center p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-500 uppercase transition-all">Sedang</span></label>
                        <label class="cursor-pointer"><input type="radio" name="ketHujan" value="Lebat" class="hidden active-radio"><span class="block text-center p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-500 uppercase transition-all">Lebat</span></label>
                    </div>

                    <div id="inputAngin" class="hidden bg-amber-50 p-3 rounded-lg border border-amber-100 flex items-center justify-between">
                        <span class="text-[10px] font-black text-amber-600 uppercase">Kecepatan Max</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="windSpeed" step="0.1" class="w-16 bg-transparent border-b-2 border-amber-400 text-center font-black text-lg outline-none text-amber-800" placeholder="0">
                            <span class="text-[9px] font-bold uppercase text-amber-600">Km/j</span>
                        </div>
                    </div>

                    <div id="inputTunggu" class="hidden">
                        <input type="text" id="customReason" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold text-xs outline-none" placeholder="Tulis alasan standby...">
                    </div>
                </div>
            </div>

            <!-- Timer Card -->
            <div class="bg-slate-900 rounded-3xl p-6 text-center shadow-2xl relative overflow-hidden">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-blue-500 opacity-10 rounded-full blur-2xl"></div>
                <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-emerald-500 opacity-10 rounded-full blur-2xl"></div>
                
                <p id="timerDisplay" class="text-5xl font-black text-white font-mono tracking-tighter drop-shadow-lg">00:00:00</p>
                <p id="timerLabel" class="text-[10px] font-bold text-slate-400 uppercase mt-2">Menunggu Dimulai</p>
                <p id="startTimeLabel" class="text-[9px] text-slate-500 mt-1 font-mono uppercase bg-slate-800 inline-block px-2 py-1 rounded-full">--:--:--</p>
                
                <div class="mt-6 flex justify-center">
                    <button onclick="startTimer()" id="btnStart" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-4 rounded-2xl font-black text-sm shadow-[0_4px_20px_rgba(16,185,129,0.4)] transition-all">▶ MULAI RECORDING</button>
                    <button onclick="stopTimer()" id="btnStop" class="w-full bg-rose-500 text-white py-4 rounded-2xl font-black text-sm shadow-[0_4px_20px_rgba(244,63,94,0.4)] hidden transition-all animate-pulse">■ STOP RECORDING</button>
                </div>
            </div>

            <button onclick="saveData()" id="btnSave" class="w-full bg-white border-2 border-blue-600 text-blue-700 py-4 rounded-2xl font-black text-xs shadow-lg uppercase tracking-widest active:scale-95 transition-all">💾 Simpan Data ke Server</button>

            <!-- History Hari Ini -->
            <div class="mt-6">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-3 px-2">History Hari Ini</h3>
                <div class="bg-white rounded-2xl p-2 shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- Diisi oleh JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- ================= DASHBOARD SECTION ================= -->
        <section id="dashboard-section" class="hidden space-y-6 transition-all duration-300">
            
            <div class="glass rounded-3xl p-5 shadow-lg">
                <h2 class="text-sm font-black text-slate-800 flex items-center gap-2 mb-4">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    AKTIVITAS SAAT INI
                </h2>
                <div id="active-users-container" class="max-h-60 overflow-y-auto space-y-2 pr-1">
                    <p class="text-xs text-slate-400 text-center py-4">Memuat data...</p>
                </div>
            </div>

            <div class="glass rounded-3xl p-5 shadow-lg">
                <h2 class="text-sm font-black text-slate-800 mb-4">📈 GRAFIK KENDALA</h2>
                <div class="bg-white p-2 rounded-xl border border-slate-100">
                    <canvas id="productivityChart" height="200"></canvas>
                </div>
            </div>
            <div class="glass rounded-3xl p-5 shadow-lg">
                <h2 class="text-sm font-black text-slate-800 flex items-center gap-2 mb-4">⬇️ EXPORT DATA (CSV)</h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="relative">
                            <label class="text-[9px] font-bold text-slate-500 absolute top-1 left-2">Mulai Tanggal</label>
                            <input type="date" id="filter_start" class="w-full bg-slate-50 border border-slate-200 rounded-lg pt-5 pb-1 px-2 text-xs font-bold outline-none">
                        </div>
                        <div class="relative">
                            <label class="text-[9px] font-bold text-slate-500 absolute top-1 left-2">Sampai Tanggal</label>
                            <input type="date" id="filter_end" class="w-full bg-slate-50 border border-slate-200 rounded-lg pt-5 pb-1 px-2 text-xs font-bold outline-none">
                        </div>
                    </div>
                    <div class="relative">
                        <label class="text-[9px] font-bold text-slate-500 absolute top-1 left-2">Filter Pengawas (Opsional)</label>
                        <input list="list_pengawas" id="filter_pengawas" class="w-full bg-slate-50 border border-slate-200 rounded-lg pt-5 pb-1 px-2 text-xs font-bold outline-none" placeholder="Semua Pengawas...">
                    </div>
                    <button onclick="downloadCSV()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-black text-xs shadow-md transition-all">Unduh Laporan (.csv)</button>
                </div>
            </div>
            
        </section>

        <!-- ================= MASTER DATA SECTION ================= -->
        <section id="master-section" class="hidden space-y-4 transition-all duration-300">
            
            <!-- Paddock -->
            <div class="glass rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-xs font-black text-slate-700 uppercase mb-2">Master Paddock</h3>
                <div class="flex gap-2 mb-3">
                    <input type="text" id="inp_paddock" class="flex-1 bg-white border border-slate-200 rounded-lg p-2 text-xs font-bold outline-none" placeholder="Tambah paddock...">
                    <button onclick="addMaster('paddock', 'inp_paddock')" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">+</button>
                </div>
                <div id="m_paddock_list" class="max-h-40 overflow-y-auto pr-1"></div>
            </div>

            <!-- Pengawas -->
            <div class="glass rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-xs font-black text-slate-700 uppercase mb-2">Master Pengawas</h3>
                <div class="flex gap-2 mb-3">
                    <input type="text" id="inp_pengawas" class="flex-1 bg-white border border-slate-200 rounded-lg p-2 text-xs font-bold outline-none" placeholder="Tambah pengawas...">
                    <button onclick="addMaster('pengawas', 'inp_pengawas')" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">+</button>
                </div>
                <div id="m_pengawas_list" class="max-h-40 overflow-y-auto pr-1"></div>
            </div>

            <!-- Kegiatan -->
            <div class="glass rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-xs font-black text-slate-700 uppercase mb-2">Master Kegiatan</h3>
                <div class="flex gap-2 mb-3">
                    <input type="text" id="inp_kegiatan" class="flex-1 bg-white border border-slate-200 rounded-lg p-2 text-xs font-bold outline-none" placeholder="Tambah kegiatan...">
                    <button onclick="addMaster('kegiatan', 'inp_kegiatan')" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">+</button>
                </div>
                <div id="m_kegiatan_list" class="max-h-40 overflow-y-auto pr-1"></div>
            </div>

        </section>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] pb-safe">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchTab('tracker')" id="nav-tracker" class="nav-item flex-1 py-4 text-blue-600 flex flex-col items-center gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[9px] font-black uppercase">Tracker</span>
            </button>
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex-1 py-4 text-slate-400 flex flex-col items-center gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-[9px] font-black uppercase">Dashboard</span>
            </button>
            <button onclick="switchTab('master')" id="nav-master" class="nav-item flex-1 py-4 text-slate-400 flex flex-col items-center gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                <span class="text-[9px] font-black uppercase">Master</span>
            </button>
        </div>
    </nav>

    <script src="./app.js"></script>
</body>
</html>
