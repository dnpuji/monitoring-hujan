<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Hujan Merauke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-radio:checked + span { background-color: #1d4ed8; color: white; border-color: #1d4ed8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl border-t-[10px] border-blue-600 overflow-hidden">
        <div class="p-6">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-blue-900">MONITORING HUJAN</h2>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.3em] mt-2 uppercase">Sugar Cane Project - Merauke</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-blue-500 uppercase ml-2">Petugas</label>
                    <input type="text" id="petugas" oninput="saveName()" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-blue-400 transition-all" placeholder="Nama Anda...">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-blue-500 uppercase ml-2">Paddock / Blok</label>
                    <input type="text" id="paddock" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-3 font-bold text-slate-700 outline-none focus:border-blue-400 transition-all" placeholder="Nomor Paddock...">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startHujan()" id="btnStart" class="bg-emerald-500 text-white p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase text-xs">Mulai</button>
                    <button onclick="stopHujan()" id="btnStop" class="bg-rose-500 text-white p-4 rounded-2xl font-black shadow-lg opacity-20 active:scale-95 transition-all uppercase text-xs" disabled>Selesai</button>
                </div>

                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center shadow-inner font-mono font-black text-blue-800 text-lg">
                    <span id="displayStart">--:--</span> <span class="text-blue-300">→</span> <span id="displayStop">--:--</span>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Ringan" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Ringan</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Sedang" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Sedang</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="intensitas" value="Lebat" class="hidden active-radio">
                        <span class="block text-center p-3 border-2 border-slate-100 rounded-xl text-[10px] font-black text-slate-400 uppercase transition-all">Lebat</span>
                    </label>
                </div>

                <button onclick="kirimData()" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">Simpan Laporan</button>

                <div id="copySection" class="hidden">
                    <button onclick="copySingle()" class="w-full bg-emerald-50 text-emerald-600 border-2 border-emerald-200 py-3 rounded-xl font-bold text-[10px] uppercase">📋 Salin Laporan Terakhir</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 p-6">
            <h3 class="text-center text-white text-[10px] font-black tracking-[0.4em] mb-4 opacity-50 uppercase italic underline decoration-blue-500">Panel Control Admin</h3>
            <div class="space-y-3">
                <p id="statHariIni" class="text-emerald-400 font-mono text-[9px] text-center mb-2 uppercase font-bold">Menghubungkan Server...</p>
                <button onclick="copyAllToday()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">📋 SALIN SEMUA DATA HARI INI</button>
                <button onclick="downloadExcelRange()" class="w-full bg-slate-700 text-slate-300 py-3 rounded-xl text-[10px] font-black border border-slate-600 flex items-center justify-center gap-2">📂 UNDUH EXCEL (FILTER)</button>
            </div>
        </div>
    </div>

    <textarea id="tempBox" style="position:fixed;top:-999px;opacity:0"></textarea>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALY1vj0Qp93fY0jYd3D7MFseJn24cyV9E",
            authDomain: "monitoring-hujan-27a0e.firebaseapp.com",
            projectId: "monitoring-hujan-27a0e",
            storageBucket: "monitoring-hujan-27a0e.firebasestorage.app",
            messagingSenderId: "864443661330",
            appId: "1:864443661330:web:41d987b7a412bb9fb12ccb",
            measurementId: "G-PDZN4T05Y1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let lastReport = ""; 
        let jamMulai, jamSelesai;

        window.onload = () => {
            const savedName = localStorage.getItem('namaPetugas');
            if(savedName) document.getElementById('petugas').value = savedName;
            monitorRealtime();
        };

        function saveName() { localStorage.setItem('namaPetugas', document.getElementById('petugas').value); }

        function startHujan() {
            jamMulai = new Date();
            document.getElementById('displayStart').innerText = jamMulai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStart').disabled = true; document.getElementById('btnStart').classList.add('opacity-20');
            document.getElementById('btnStop').disabled = false; document.getElementById('btnStop').classList.remove('opacity-20');
        }

        function stopHujan() {
            jamSelesai = new Date();
            document.getElementById('displayStop').innerText = jamSelesai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStop').disabled = true; document.getElementById('btnStop').classList.add('opacity-20');
        }

        // FUNGSI SALIN BARU (TANPA ERROR)
        function secureCopy(text) {
            const tempBox = document.getElementById('tempBox');
            tempBox.value = text;
            tempBox.select();
            tempBox.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                alert("✅ Berhasil Disalin!");
            } catch (err) {
                window.prompt("Salin manual teks ini:", text);
            }
        }

        async function kirimData() {
            const petugas = document.getElementById('petugas').value;
            const paddock = document.getElementById('paddock').value;
            const intensitas = document.querySelector('input[name="intensitas"]:checked')?.value;
            if (!petugas || !paddock || !jamMulai || !jamSelesai || !intensitas) return alert("Lengkapi data!");

            const durasi = Math.round((jamSelesai - jamMulai) / 60000);
            const tgl = new Date().toLocaleDateString('id-ID');

            try {
                await db.collection("data_hujan").add({
                    petugas, paddock, keterangan: intensitas, durasi_menit: durasi,
                    jam_mulai: jamMulai.toLocaleTimeString('id-ID'),
                    jam_selesai: jamSelesai.toLocaleTimeString('id-ID'),
                    tanggal: tgl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                lastReport = `*LAPORAN HUJAN*\n👤: ${petugas}\n📍: ${paddock}\n🌦️: ${intensitas}\n⏱️: ${durasi} Menit\n📅: ${tgl}`;
                document.getElementById('copySection').classList.remove('hidden');
                alert("✅ Tersimpan!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function copySingle() { secureCopy(lastReport); setTimeout(() => location.reload(), 1000); }

        // FUNGSI SALIN SEMUA DATA (VERSI STABIL TANPA INDEX)
        async function copyAllToday() {
            const tgl = new Date().toLocaleDateString('id-ID');
            // Menghapus 'orderBy' agar tidak butuh index Firebase
            const snapshot = await db.collection("data_hujan").where("tanggal", "==", tgl).get();

            if (snapshot.empty) return alert("Belum ada data hari ini.");

            let rawData = [];
            snapshot.forEach(doc => rawData.push(doc.data()));
            
            // Urutkan manual berdasarkan waktu mulai (A-Z)
            rawData.sort((a, b) => a.jam_mulai.localeCompare(b.jam_mulai));

            let teksFull = `*REKAP MONITORING HUJAN HARI INI*\nTanggal: ${tgl}\n----------------------------\n`;
            rawData.forEach((d, i) => {
                teksFull += `${i+1}. *${d.paddock}* | ${d.keterangan} | ${d.durasi_menit}m (${d.jam_mulai}-${d.jam_selesai}) - _${d.petugas}_\n`;
            });
            teksFull += `\n----------------------------\n_Total: ${snapshot.size} Kejadian_`;
            secureCopy(teksFull);
        }

        function monitorRealtime() {
            const tgl = new Date().toLocaleDateString('id-ID');
            db.collection("data_hujan").where("tanggal", "==", tgl)
              .onSnapshot(snap => {
                  document.getElementById('statHariIni').innerText = `SERVER: ${snap.size} LAPORAN HARI INI`;
              });
        }

        async function downloadExcelRange() {
            const mulai = prompt("Unduh dari tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            const selesai = prompt("Sampai tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            if(!mulai || !selesai) return;

            const snapshot = await db.collection("data_hujan").get();
            let dataArr = [];
            snapshot.forEach(doc => {
                let d = doc.data();
                if (d.tanggal >= mulai && d.tanggal <= selesai) {
                    dataArr.push({ Tanggal: d.tanggal, Paddock: d.paddock, Intensitas: d.keterangan, Durasi: d.durasi_menit, Mulai: d.jam_mulai, Selesai: d.jam_selesai, Petugas: d.petugas });
                }
            });
            if(dataArr.length === 0) return alert("Data kosong.");
            dataArr.sort((a,b) => a.Tanggal.localeCompare(b.Tanggal));
            const ws = XLSX.utils.json_to_sheet(dataArr);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_Hujan_${mulai.replace(/\//g,'-')}.xlsx`);
        }
    </script>
</body>
</html>
