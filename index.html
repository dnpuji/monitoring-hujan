<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Hujan - Admin Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 sm:p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-2xl border-t-8 border-blue-600">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-blue-800 uppercase tracking-tight">Monitoring Hujan</h2>
            <p class="text-[10px] text-gray-400 font-bold tracking-[0.3em]">SIHAR BATARA GUNA PROJECT</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">Nama Petugas</label>
                <input type="text" id="petugas" oninput="saveName()" class="w-full border-b-2 border-gray-200 focus:border-blue-500 outline-none p-2 text-lg font-semibold bg-transparent" placeholder="Nama Anda...">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">Lokasi Paddock / Blok</label>
                <input type="text" id="paddock" class="w-full border-b-2 border-gray-200 focus:border-blue-500 outline-none p-2 text-lg font-semibold bg-transparent" placeholder="Contoh: A1 atau Blok 12">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="startHujan()" id="btnStart" class="bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase text-sm">Mulai</button>
                <button onclick="stopHujan()" id="btnStop" class="bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-2xl font-black shadow-lg opacity-20 active:scale-95 transition-all uppercase text-sm" disabled>Selesai</button>
            </div>

            <div class="bg-blue-50 p-4 rounded-2xl flex justify-around border border-blue-100 italic">
                <div class="text-center">
                    <p class="text-[9px] text-blue-400 font-bold uppercase">Jam Mulai</p>
                    <p id="displayStart" class="text-sm font-mono font-bold text-blue-700">--:--</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-blue-400 font-bold uppercase">Jam Selesai</p>
                    <p id="displayStop" class="text-sm font-mono font-bold text-blue-700">--:--</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <label class="flex flex-col items-center p-3 border rounded-xl cursor-pointer has-[:checked]:bg-blue-600 has-[:checked]:text-white transition-all bg-gray-50">
                    <input type="radio" name="intensitas" value="Ringan" class="hidden">
                    <span class="text-xs font-bold uppercase">Ringan</span>
                </label>
                <label class="flex flex-col items-center p-3 border rounded-xl cursor-pointer has-[:checked]:bg-blue-600 has-[:checked]:text-white transition-all bg-gray-50">
                    <input type="radio" name="intensitas" value="Sedang" class="hidden">
                    <span class="text-xs font-bold uppercase">Sedang</span>
                </label>
                <label class="flex flex-col items-center p-3 border rounded-xl cursor-pointer has-[:checked]:bg-blue-600 has-[:checked]:text-white transition-all bg-gray-50">
                    <input type="radio" name="intensitas" value="Lebat" class="hidden">
                    <span class="text-xs font-bold uppercase">Lebat</span>
                </label>
            </div>

            <button onclick="kirimData()" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-[0.2em] text-sm">Simpan Database</button>

            <div id="copySection" class="hidden pt-2">
                <button onclick="copyToWA()" class="w-full bg-emerald-100 text-emerald-700 border-2 border-emerald-500 py-3 rounded-xl font-bold text-xs uppercase tracking-wider">📋 Salin Laporan Terakhir</button>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t-4 border-double border-gray-100">
            <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-[0.3em] text-center italic">Dashboard Rekapitulasi</h3>
            
            <div class="bg-slate-900 p-5 rounded-3xl shadow-inner">
                <p id="statHariIni" class="text-emerald-400 font-mono text-[10px] text-center mb-4 tracking-tighter uppercase font-bold">Menghubungkan ke Server...</p>
                
                <div class="space-y-3">
                    <button onclick="copyAllToday()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        📋 SALIN SEMUA DATA HARI INI
                    </button>
                    
                    <button onclick="downloadExcelRange()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        📂 UNDUH EXCEL (FILTER TANGGAL)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <textarea id="tempCopyBox" class="fixed -top-full opacity-0"></textarea>

    <script>
        // Konfigurasi Firebase Milik Sihar Batara Guna
        const firebaseConfig = {
            apiKey: "AIzaSyALY1vj0Qp93fY0jYd3D7MFseJn24cyV9E",
            authDomain: "monitoring-hujan-27a0e.firebaseapp.com",
            projectId: "monitoring-hujan-27a0e",
            storageBucket: "monitoring-hujan-27a0e.firebasestorage.app",
            messagingSenderId: "864443661330",
            appId: "1:864443661330:web:41d987b7a412bb9fb12ccb",
            measurementId: "G-PDZN4T05Y1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let lastReport = ""; 
        let jamMulai, jamSelesai;

        window.onload = () => {
            const savedName = localStorage.getItem('namaPetugas');
            if(savedName) document.getElementById('petugas').value = savedName;
            monitorRealtime();
        };

        function saveName() {
            localStorage.setItem('namaPetugas', document.getElementById('petugas').value);
        }

        function startHujan() {
            jamMulai = new Date();
            document.getElementById('displayStart').innerText = jamMulai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStart').classList.add('opacity-20');
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStop').classList.remove('opacity-20');
        }

        function stopHujan() {
            jamSelesai = new Date();
            document.getElementById('displayStop').innerText = jamSelesai.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStop').classList.add('opacity-20');
        }

        // Fungsi Salin Universal (Paling Aman)
        function copyTextUniversal(text) {
            const tempBox = document.getElementById('tempCopyBox');
            tempBox.value = text;
            tempBox.select();
            tempBox.setSelectionRange(0, 99999); // Untuk HP

            try {
                document.execCommand('copy');
                alert("✅ Berhasil disalin ke Clipboard!");
            } catch (err) {
                alert("❌ Gagal menyalin otomatis. Silakan salin manual.");
            }
        }

        async function kirimData() {
            const petugas = document.getElementById('petugas').value;
            const paddock = document.getElementById('paddock').value;
            const intensitas = document.querySelector('input[name="intensitas"]:checked')?.value;

            if (!petugas || !paddock || !jamMulai || !jamSelesai || !intensitas) {
                alert("Data belum lengkap!"); return;
            }

            const durasi = Math.round((jamSelesai - jamMulai) / 60000);
            const tgl = new Date().toLocaleDateString('id-ID');

            try {
                await db.collection("data_hujan").add({
                    petugas, paddock, keterangan: intensitas, durasi_menit: durasi,
                    jam_mulai: jamMulai.toLocaleTimeString('id-ID'),
                    jam_selesai: jamSelesai.toLocaleTimeString('id-ID'),
                    tanggal: tgl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                lastReport = `*LAPORAN HUJAN*\n👤: ${petugas}\n📍: ${paddock}\n🌦️: ${intensitas}\n⏱️: ${durasi} Menit\n📅: ${tgl}`;
                document.getElementById('copySection').classList.remove('hidden');
                alert("✅ Tersimpan di Database!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function copyToWA() {
            copyTextUniversal(lastReport);
            setTimeout(() => { location.reload(); }, 800);
        }

        async function copyAllToday() {
            const tgl = new Date().toLocaleDateString('id-ID');
            const snapshot = await db.collection("data_hujan")
                                   .where("tanggal", "==", tgl)
                                   .orderBy("timestamp", "asc")
                                   .get();

            if (snapshot.empty) return alert("Belum ada data masuk hari ini.");

            let teksFull = `*REKAP MONITORING HUJAN HARI INI*\nTanggal: ${tgl}\n----------------------------\n`;
            let i = 1;
            snapshot.forEach(doc => {
                const d = doc.data();
                teksFull += `${i}. *${d.paddock}* | ${d.keterangan} | ${d.durasi_menit}m (${d.jam_mulai}-${d.jam_selesai}) - _${d.petugas}_\n`;
                i++;
            });
            teksFull += `\n----------------------------\n_Total: ${snapshot.size} Kejadian_`;

            copyTextUniversal(teksFull);
        }

        function monitorRealtime() {
            const tgl = new Date().toLocaleDateString('id-ID');
            db.collection("data_hujan").where("tanggal", "==", tgl)
              .onSnapshot(snap => {
                  document.getElementById('statHariIni').innerText = `STATUS: ${snap.size} DATA TERKUMPUL HARI INI`;
              });
        }

        async function downloadExcelRange() {
            const mulai = prompt("Unduh dari tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            const selesai = prompt("Sampai tanggal (DD/MM/YYYY):", new Date().toLocaleDateString('id-ID'));
            
            if(!mulai || !selesai) return;

            const snapshot = await db.collection("data_hujan")
                                   .where("tanggal", ">=", mulai)
                                   .where("tanggal", "<=", selesai)
                                   .get();

            let data = [];
            snapshot.forEach(doc => {
                let d = doc.data();
                delete d.timestamp; // Hapus data timestamp agar excel rapi
                data.push(d);
            });

            if(data.length === 0) return alert("Data tidak ditemukan.");

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan Hujan");
            XLSX.writeFile(wb, `Rekap_Hujan_${mulai.replace(/\//g,'-')}.xlsx`);
        }
    </script>
</body>
</html>
